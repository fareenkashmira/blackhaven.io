<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Abyss — Virtual Visiting Card</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --abyss:#010d1a;
  --deep:#002244;
  --mid:#0055aa;
  --bright:#0088dd;
  --electric:#00ccff;
  --foam:rgba(180,240,255,.85);
  --text:#d0f0ff;
  --muted:rgba(150,220,255,.5);
}
body{background:radial-gradient(ellipse at 50% 40%,#001830 0%,#010810 60%,#000508 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;padding:2rem;color:var(--text);}

nav{position:fixed;top:0;left:0;right:0;z-index:900;padding:16px 40px;display:flex;justify-content:space-between;align-items:center;background:rgba(1,13,26,.92);border-bottom:.5px solid rgba(0,180,255,.12);backdrop-filter:blur(12px)}
.nav-logo{font-family:'Cinzel',serif;font-size:12px;color:var(--electric);letter-spacing:4px;text-decoration:none;opacity:.7}
.nav-back{font-size:10px;color:rgba(0,180,255,.4);text-decoration:none;letter-spacing:3px;text-transform:uppercase;transition:color .3s}
.nav-back:hover{color:var(--electric)}
.page-label{font-size:9px;letter-spacing:5px;color:rgba(0,200,255,.35);text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:12px}
.page-label::before,.page-label::after{content:'';width:28px;height:.5px;background:var(--electric);opacity:.3}
.hint{font-size:9px;color:rgba(0,200,255,.3);letter-spacing:3px;text-transform:uppercase;margin-top:1.5rem;display:flex;align-items:center;gap:8px}
.hint-icon{display:inline-block;animation:spin 3s ease-in-out infinite;font-style:normal}
@keyframes spin{0%,100%{transform:rotateY(0)}50%{transform:rotateY(40deg)}}

/* CARD */
.scene{width:360px;height:290px;perspective:1200px;cursor:pointer}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.4,.2,.2,1)}
.scene.flipped .card-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}
.face-back{transform:rotateY(180deg)}

/* FRONT — deep water */
.front{
  background:
    radial-gradient(ellipse at 78% 22%, rgba(0,160,255,.45) 0%, transparent 38%),
    radial-gradient(ellipse at 20% 75%, rgba(0,80,200,.3) 0%, transparent 40%),
    radial-gradient(ellipse at 55% 50%, rgba(0,40,100,.6) 0%, transparent 60%),
    linear-gradient(145deg, #010d1a 0%, #001428 35%, #002244 65%, #001a36 100%);
  border:.5px solid rgba(0,180,255,.2);
  position:relative;
  display:flex;
  align-items:center;
}

/* animated ripple rings */
.ripple-origin{position:absolute;top:30%;right:22%;width:0;height:0}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(0,210,255,.4);transform:translate(-50%,-50%) scale(0);animation:ripple 4s ease-out infinite}
.ring:nth-child(1){width:60px;height:60px;animation-delay:0s}
.ring:nth-child(2){width:60px;height:60px;animation-delay:1.3s;border-color:rgba(0,180,255,.25)}
.ring:nth-child(3){width:60px;height:60px;animation-delay:2.6s;border-color:rgba(0,150,255,.15)}
@keyframes ripple{
  0%{transform:translate(-50%,-50%) scale(0);opacity:.8}
  100%{transform:translate(-50%,-50%) scale(5.5);opacity:0}
}

/* splash highlight — light catching water surface */
.splash{
  position:absolute;
  top:18%;right:16%;
  width:28px;height:28px;
  background:radial-gradient(circle,rgba(180,240,255,.6) 0%,rgba(100,200,255,.2) 40%,transparent 70%);
  border-radius:50%;
  animation:pulse 4s ease-in-out infinite;
}
.splash::after{
  content:'';
  position:absolute;
  inset:-4px;
  border-radius:50%;
  border:.5px solid rgba(0,220,255,.3);
  animation:pulse 4s ease-in-out 0.5s infinite;
}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}

/* light caustics — refracted light on the "floor" */
.caustic{position:absolute;border-radius:50%;filter:blur(8px);opacity:.08;animation:drift 8s ease-in-out infinite alternate}
.caustic:nth-child(1){width:80px;height:40px;background:rgba(0,200,255,1);bottom:20%;left:10%;animation-delay:0s}
.caustic:nth-child(2){width:50px;height:25px;background:rgba(0,150,255,1);bottom:30%;left:30%;animation-delay:2s}
.caustic:nth-child(3){width:60px;height:30px;background:rgba(0,220,255,1);bottom:15%;right:20%;animation-delay:1s}
@keyframes drift{0%{transform:scaleX(1) translateX(0)}100%{transform:scaleX(1.3) translateX(8px)}}

/* water surface line */
.surface-line{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,220,255,.4),rgba(180,240,255,.7),rgba(0,220,255,.4),transparent);
  animation:surface 3s ease-in-out infinite alternate;
}
@keyframes surface{0%{opacity:.5}100%{opacity:1}}

.front-ct{padding:26px 24px 26px 34px;position:relative;z-index:2}
.f-tag{font-size:7px;color:rgba(0,200,255,.45);letter-spacing:4px;text-transform:uppercase;margin-bottom:14px}
.f-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-style:italic;font-weight:300;color:var(--text);line-height:1.2;letter-spacing:.5px;margin-bottom:8px;text-shadow:0 0 20px rgba(0,200,255,.3)}
.f-role{font-size:8px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:16px}
.f-rule{width:44px;height:.5px;background:linear-gradient(90deg,var(--electric),transparent);margin-bottom:16px;opacity:.6}
.f-url{font-size:8px;color:rgba(0,180,255,.4);letter-spacing:1.5px}

/* depth indicator — vertical bar like sonar depth */
.depth-bar{position:absolute;right:0;top:0;bottom:0;width:5px;background:linear-gradient(to bottom,rgba(0,220,255,.5),rgba(0,100,200,.3),rgba(0,40,100,.1))}

/* BACK */
.back{
  background:
    radial-gradient(ellipse at 30% 70%, rgba(0,80,180,.25) 0%, transparent 50%),
    linear-gradient(160deg,#010d1a 0%,#001228 50%,#001a36 100%);
  border:.5px solid rgba(0,180,255,.15);
  position:relative;
  display:flex;flex-direction:column;justify-content:center;
  padding:32px 36px;
  overflow:hidden;
}
.back::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,transparent,var(--electric),rgba(0,180,255,.3),transparent)}
.back-surface{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,200,255,.35),transparent)}
.b-depth-bg{position:absolute;right:-12px;bottom:-20px;font-family:'Cormorant Garamond',serif;font-size:110px;font-style:italic;color:rgba(0,100,200,.06);line-height:1}
.b-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;color:rgba(0,200,255,.4);letter-spacing:2px;margin-bottom:18px}
.b-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:10px;color:rgba(180,230,255,.55)}
.b-icon{width:13px;height:13px;fill:rgba(0,180,255,.45);flex-shrink:0}

/* back ripple echo */
.back-ripple{position:absolute;right:30px;bottom:30px;width:80px;height:80px;border:1px solid rgba(0,180,255,.07);border-radius:50%;animation:backR 5s ease-out infinite}
.back-ripple:nth-child(2){width:80px;height:80px;animation-delay:1.6s;border-color:rgba(0,180,255,.04)}
@keyframes backR{0%{transform:scale(0);opacity:.6}100%{transform:scale(2.5);opacity:0}}

@media(max-width:500px){.scene{width:300px;height:240px}}
</style>
</head>
