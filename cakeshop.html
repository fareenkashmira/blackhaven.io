<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cakes n Cream — Sweet Solution</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

html,body{
  width:100%;min-height:100vh;
  background:#0c0704;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;
  user-select:none;
}

body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 55% at 15% 85%, rgba(80,40,10,.45) 0%,transparent 60%),
    radial-gradient(ellipse 50% 45% at 85% 15%, rgba(80,40,10,.30) 0%,transparent 60%),
    radial-gradient(ellipse 80% 80% at 50% 50%, #140a03 0%,#0c0704 100%);
  pointer-events:none;
}

.wrapper{
  display:flex;flex-direction:column;align-items:center;gap:28px;
  position:relative;z-index:1;
}

.tap-hint{
  font-family:'Cinzel',serif;
  font-size:9.5px;letter-spacing:.4em;
  color:rgba(184,146,74,.38);
  text-transform:uppercase;
  transition:opacity .5s;
  pointer-events:none;
}
.wrapper.flipped .tap-hint{opacity:0}

.scene{
  width:400px;height:600px;
  perspective:1400px;
  cursor:pointer;
}

.card{
  width:100%;height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform 1s cubic-bezier(.645,.045,.355,1);
}

.wrapper.flipped .card{transform:rotateY(180deg)}

.face{
  position:absolute;inset:0;
  border-radius:18px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  overflow:hidden;
}

/* FRONT */
.face-front{
  background:linear-gradient(158deg, #fdfaf4 0%, #f7edd8 30%, #eeddc0 65%, #e4cfa8 100%);
}
.face-front::after{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.04;mix-blend-mode:multiply;pointer-events:none;z-index:0;
}

/* BACK */
.face-back{
  background:linear-gradient(150deg,#160b03 0%,#1f1008 40%,#160b03 100%);
  transform:rotateY(180deg);
}

.dust{
  position:absolute;inset:0;width:100%;height:100%;
  border-radius:18px;pointer-events:none;z-index:1;
}

.border-inset{
  position:absolute;inset:12px;
  border:1px solid rgba(184,146,74,.22);
  border-radius:10px;pointer-events:none;z-index:2;
}
.border-inset::before{
  content:'';position:absolute;inset:5px;
  border:.5px solid rgba(184,146,74,.10);border-radius:6px;
}

.corner-svg{
  position:absolute;width:32px;height:32px;z-index:3;
  opacity:0;animation:fadeIn .8s ease forwards;
}
.c-tl{top:14px;left:14px;animation-delay:1.8s}
.c-tr{top:14px;right:14px;transform:scaleX(-1);animation-delay:1.9s}
.c-bl{bottom:14px;left:14px;transform:scaleY(-1);animation-delay:2s}
.c-br{bottom:14px;right:14px;transform:scale(-1,-1);animation-delay:2.1s}

/* front layout */
.front-inner{
  position:absolute;inset:0;z-index:4;
  display:flex;flex-direction:column;align-items:center;
  padding:42px 36px 36px;
}

.hr{width:100%;display:flex;align-items:center;gap:8px;opacity:0;animation:fadeUp .7s ease forwards}
.hr-line{flex:1;height:.5px;background:linear-gradient(90deg,transparent,rgba(160,112,48,.7),transparent)}
.hr-gem{width:5px;height:5px;background:#b8924a;transform:rotate(45deg);flex-shrink:0}
.hr-dot{width:2.5px;height:2.5px;border-radius:50%;background:rgba(184,146,74,.6);flex-shrink:0}

.hr-top{margin-bottom:26px;animation-delay:.5s}
.hr-mid{margin-bottom:22px;margin-top:22px;animation-delay:1.5s}
.hr-bot{margin-bottom:20px;animation-delay:1.6s}

.seal{width:58px;height:58px;margin-bottom:18px;opacity:0;animation:fadeUp .8s ease .7s forwards}

.brand{
  font-family:'Cinzel Decorative',serif;
  font-size:26px;font-weight:700;
  color:#2a1508;letter-spacing:.12em;
  line-height:1;margin-bottom:8px;
  opacity:0;animation:fadeUp .8s ease .95s forwards;
  text-align:center;
}
.subbrand{
  font-family:'Cinzel',serif;font-size:9px;font-weight:400;
  letter-spacing:.55em;color:#9a6030;text-transform:uppercase;
  opacity:0;animation:fadeUp .7s ease 1.1s forwards;margin-bottom:0;
}

.cake-scene{
  width:260px;height:190px;flex-shrink:0;
  opacity:0;animation:fadeUp .9s ease 1.25s forwards;
}

.addr{text-align:center;opacity:0;animation:fadeUp .7s ease 1.75s forwards}
.addr-city{
  font-family:'Cinzel',serif;font-size:11.5px;font-weight:500;
  letter-spacing:.28em;color:#3d1e08;margin-bottom:4px;
}
.addr-line{
  font-family:'Cormorant Garamond',serif;font-size:12px;
  font-weight:300;font-style:italic;letter-spacing:.14em;color:#9a6030;
}

/* BACK */
.back-border{
  position:absolute;inset:13px;
  border:.5px solid rgba(184,146,74,.28);
  border-radius:10px;pointer-events:none;z-index:1;
}
.back-border::before{
  content:'';position:absolute;inset:7px;
  border:.5px solid rgba(184,146,74,.12);border-radius:6px;
}

.back-inner{
  position:absolute;inset:0;z-index:2;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:52px 44px;gap:0;
}

.back-seal{width:50px;height:50px;margin-bottom:16px;flex-shrink:0}
.back-brand{
  font-family:'Cinzel Decorative',serif;font-size:18px;font-weight:700;
  letter-spacing:.18em;color:#c9a06a;margin-bottom:5px;text-align:center;
}
.back-sub{
  font-family:'Cinzel',serif;font-size:8px;
  letter-spacing:.5em;color:rgba(184,146,74,.45);
  text-transform:uppercase;margin-bottom:28px;
}

.back-hr{width:100%;display:flex;align-items:center;gap:8px;margin-bottom:28px}
.bhl{flex:1;height:.5px}
.bhl-l{background:linear-gradient(90deg,transparent,rgba(184,146,74,.45))}
.bhl-r{background:linear-gradient(90deg,rgba(184,146,74,.45),transparent)}
.bhg{width:4px;height:4px;background:#b8924a;transform:rotate(45deg);flex-shrink:0}

.socials{width:100%;display:flex;flex-direction:column;gap:13px}

.soc{
  display:flex;align-items:center;gap:14px;
  padding:13px 18px;
  border:.5px solid rgba(184,146,74,.15);
  border-radius:9px;background:rgba(184,146,74,.03);
  text-decoration:none;
  transition:background .25s,border-color .25s,transform .2s;
}
.soc:hover{
  background:rgba(184,146,74,.09);
  border-color:rgba(184,146,74,.38);
  transform:translateX(4px);
}
.soc-ico{
  width:34px;height:34px;border-radius:50%;
  border:.5px solid rgba(184,146,74,.3);
  display:flex;align-items:center;justify-content:center;
  background:rgba(184,146,74,.06);flex-shrink:0;
}
.soc-ico svg{width:15px;height:15px;display:block}
.soc-txt{display:flex;flex-direction:column;gap:2px;overflow:hidden}
.soc-lbl{
  font-family:'Cinzel',serif;font-size:7.5px;
  letter-spacing:.35em;color:rgba(184,146,74,.5);text-transform:uppercase;
}
.soc-val{
  font-family:'Cormorant Garamond',serif;font-size:13px;
  font-weight:400;color:#c9a06a;letter-spacing:.04em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.back-addr{
  margin-top:24px;text-align:center;
  border-top:.5px solid rgba(184,146,74,.15);
  padding-top:20px;width:100%;
}
.back-addr-txt{
  font-family:'Cormorant Garamond',serif;font-size:11px;font-style:italic;
  letter-spacing:.14em;color:rgba(184,146,74,.38);line-height:1.8;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* cake */
@keyframes layerRise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.lyr1{animation:layerRise .75s cubic-bezier(.34,1.3,.64,1) 1.3s both}
.lyr2{animation:layerRise .75s cubic-bezier(.34,1.3,.64,1) 1.52s both}
.lyr3{animation:layerRise .75s cubic-bezier(.34,1.3,.64,1) 1.74s both}
.lyr4{animation:layerRise .6s cubic-bezier(.34,1.3,.64,1) 1.96s both}

@keyframes f1{0%{transform:scaleX(1) scaleY(1) rotate(-2deg);opacity:.95}40%{transform:scaleX(.72) scaleY(1.22) rotate(3deg);opacity:.78}70%{transform:scaleX(1.1) scaleY(.88) rotate(-1deg);opacity:1}100%{transform:scaleX(.88) scaleY(1.1) rotate(2deg);opacity:.92}}
@keyframes f2{0%{transform:scaleX(1) scaleY(1) rotate(2deg);opacity:.9}35%{transform:scaleX(1.15) scaleY(.85) rotate(-3deg);opacity:1}65%{transform:scaleX(.78) scaleY(1.18) rotate(1deg);opacity:.82}100%{transform:scaleX(1.05) scaleY(1.05) rotate(-2deg);opacity:.95}}
@keyframes f3{0%{transform:scaleX(.9) scaleY(1.1) rotate(-1deg);opacity:.88}45%{transform:scaleX(1.12) scaleY(.9) rotate(2deg);opacity:1}100%{transform:scaleX(.82) scaleY(1.15) rotate(-3deg);opacity:.9}}

.fl1{animation:f1 1.7s ease-in-out infinite alternate;transform-origin:50% 100%}
.fl2{animation:f2 2.1s ease-in-out infinite alternate;transform-origin:50% 100%;animation-delay:.4s}
.fl3{animation:f3 1.5s ease-in-out infinite alternate;transform-origin:50% 100%;animation-delay:.8s}
</style>
</head>

<script>
// ── flip logic ──
const wrapper = document.getElementById('wrapper');
const scene   = document.getElementById('scene');

scene.addEventListener('click', function(e){
  if(e.target.closest('a')) return;
  wrapper.classList.toggle('flipped');
});

// ── chocolate dust particle system ──
function drawDust(canvasId, dark){
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  const W = canvas.offsetWidth;
  const H = canvas.offsetHeight;
  if(!W || !H) return;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const LP = [[44,18,6],[70,32,12],[105,58,26],[140,88,40],[28,12,4]];
  const DP = [[184,146,74],[160,112,50],[210,175,110],[130,90,40],[200,160,90]];
  const pal = dark ? DP : LP;

  function rc(a){
    const c = pal[Math.floor(Math.random()*pal.length)];
    return `rgba(${c[0]},${c[1]},${c[2]},${a.toFixed(3)})`;
  }

  // 2200 particles
  for(let i=0;i<2200;i++){
    const sz = Math.random()<.72
      ? Math.random()*.7+.1
      : Math.random()*1.6+.4;
    const a  = dark
      ? Math.random()*.3+.04
      : Math.random()*.15+.03;
    const x  = Math.random()*W;
    const y  = Math.random()*H;

    ctx.beginPath();
    ctx.fillStyle = rc(a);

    if(Math.random()<.78){
      ctx.arc(x,y,sz*.5,0,Math.PI*2);
    } else {
      const ang = Math.random()*Math.PI;
      const len = sz*(1.2+Math.random()*1.8);
      const wid = sz*.35;
      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(ang);
      ctx.ellipse(0,0,len*.5,wid*.5,0,0,Math.PI*2);
      ctx.restore();
    }
    ctx.fill();
  }

  // corner clusters
  const zones=[
    {cx:W*.08,cy:H*.08,rx:W*.22,ry:H*.18,n:dark?180:250},
    {cx:W*.92,cy:H*.88,rx:W*.2, ry:H*.22,n:dark?160:220},
    {cx:W*.9, cy:H*.1, rx:W*.18,ry:H*.16,n:dark?140:200},
    {cx:W*.1, cy:H*.9, rx:W*.18,ry:H*.16,n:dark?140:200},
    {cx:W*.5, cy:H*.98,rx:W*.35,ry:H*.08,n:dark?100:150},
  ];
  zones.forEach(z=>{
    for(let i=0;i<z.n;i++){
      const ang=Math.random()*Math.PI*2;
      const r=Math.sqrt(Math.random());
      const x=z.cx+Math.cos(ang)*z.rx*r;
      const y=z.cy+Math.sin(ang)*z.ry*r;
      const sz=Math.random()*.9+.1;
      const a=dark?Math.random()*.22+.04:Math.random()*.12+.03;
      ctx.beginPath();
      ctx.fillStyle=rc(a);
      ctx.arc(x,y,sz*.5,0,Math.PI*2);
      ctx.fill();
    }
  });
}

setTimeout(()=>{
  drawDust('df',false);
  drawDust('db',true);
},200);

window.addEventListener('resize',()=>{
  drawDust('df',false);
  drawDust('db',true);
});
</script>
